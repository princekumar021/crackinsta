<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body {
        body {
            background-color: #f0f2f5; /* Light gray background */
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; /* Modern font stack */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .calculator {
            border: none; /* Remove border */
            padding: 25px;
            border-radius: 15px; /* More rounded corners */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); /* Softer, larger shadow */
            background-color: #ffffff; /* White calculator background */
            width: 320px; /* Fixed width for consistency */
        }
        .calculator input[type="text"] {
            width: calc(100% - 20px); /* Adjust width for padding */
            margin-bottom: 20px;
            padding: 15px 10px;
            font-size: 2.2em; /* Larger display font */
            text-align: right;
            border: none; /* Remove input border */
            background-color: #e9ecef; /* Light gray input background */
            border-radius: 8px; /* Rounded input field */
            color: #343a40; /* Darker text color */
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05); /* Inner shadow for depth */
        }
        .calculator .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px; /* Slightly larger gap */
        }
        .calculator button {
            padding: 20px; /* Larger buttons */
            font-size: 1.4em; /* Larger button font */
            border: none;
            border-radius: 10px; /* Rounded buttons */
            cursor: pointer;
            background-color: #e0e0e0; /* Default button color */
            color: #343a40; /* Dark text for numbers */
            transition: all 0.2s ease-in-out; /* Smooth transitions */
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1); /* Subtle button shadow */
        }
        .calculator button:hover {
            background-color: #d5d5d5; /* Lighter hover effect */
            box-shadow: 0 7px 15px rgba(0, 0, 0, 0.2);
            transform: translateY(-3px) scale(1.02); /* More pronounced lift and slight scale */
        }
        .calculator button:active {
            transform: translateY(0) scale(0.98); /* Press down effect */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: all 0.1s ease-in-out;
        }
        .calculator .operator {
            background: linear-gradient(135deg, #6c757d, #495057); /* Gradient for operators */
            color: white;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }
        .calculator .operator:hover {
            background: linear-gradient(135deg, #5a6268, #343a40);
            transform: translateY(-3px) scale(1.02);
        }
        .calculator .operator:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .calculator .equals {
            background: linear-gradient(135deg, #28a745, #218838); /* Green gradient for equals */
            color: white;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }
        .calculator .equals:hover {
            background: linear-gradient(135deg, #218838, #1e7e34);
            transform: translateY(-3px) scale(1.02);
        }
        .calculator .equals:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .calculator .clear {
            background: linear-gradient(135deg, #dc3545, #c82333); /* Red gradient for clear */
            color: white;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }
        .calculator .clear:hover {
            background: linear-gradient(135deg, #c82333, #bd2130);
            transform: translateY(-3px) scale(1.02);
        }
        .calculator .clear:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        @keyframes displayFlash {
            0% { background-color: #e9ecef; }
            25% { background-color: #cce5ff; } /* Light blue flash */
            100% { background-color: #e9ecef; }
        }

        .calculator input[type="text"].flash {
            animation: displayFlash 0.3s ease-out;
        }
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }
        .calculator .equals:hover {
            background: linear-gradient(135deg, #218838, #1e7e34);
            transform: translateY(-2px);
        }
        .calculator .clear {
            background: linear-gradient(135deg, #dc3545, #c82333); /* Red gradient for clear */
            color: white;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }
        .calculator .clear:hover {
            background: linear-gradient(135deg, #c82333, #bd2130);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">*</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>

            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>

            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="calculateResult()" class="equals">=</button>

            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentExpression = '';

        function appendToDisplay(value) {
            currentExpression += value;
            display.value = currentExpression;
        }

        function clearDisplay() {
            currentExpression = '';
            display.value = '';
        }

        function calculateResult() {
            try {
                let result = eval(currentExpression);
                display.value = result;
                currentExpression = result.toString();
            } catch (error) {
                display.value = 'Error';
                currentExpression = '';
            }
        }
    </script>
</body>
</html>
